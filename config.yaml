    # audio-gateway (VPS, tailnet-only). The gateway runs LLM text-prep (chunking
    # + DE/EN expression tags) → native Gemini generateContent → MP3. The native
    # Hermes openai TTS provider just POSTs /v1/audio/speech; the gateway routes
    # any model matching /gemini.*tts/ to the Gemini synth pipeline.
    model: gemini-3.1-flash-tts-preview
    voice: Charon
    base_url: https://audio-gateway.jkrumm.com/v1
    api_key: not-needed
    speed: 1.0
    # Do NOT pre-truncate — the gateway chunks longform itself (briefings would
    # otherwise be cut at the OpenAI default 4096 cap).
    max_text_length: 32000
