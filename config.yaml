# Hermes Agent — config.yaml template
# Copy to ~/.hermes/config.yaml on Mac Mini M2 Pro
# Secrets resolved via .env — use ${VAR_NAME} syntax

# --- LLM ---
model:
  provider: "custom"
  base_url: "https://iu-mac-book.dinosaur-sole.ts.net/v1"
  model: "gemma4-agent"
  context_length: 128000
  # No API key — Tailscale encrypts at network layer
  reasoning_effort: "medium"
  tool_use_enforcement: true

fallback_model:
  provider: "anthropic"
  model: "claude-sonnet-4"
  api_key: "${ANTHROPIC_API_KEY}"
  base_url: "${ANTHROPIC_BASE_URL}"

# Auxiliary model strategy:
#   compression  → local Gemma 4 (sees full conversation — keep on-device)
#   web_extract  → Haiku (public web content, faster than local)
#   approval     → Haiku (speed + accuracy matter for command classification)
#   vision       → Gemini Flash (Anthropic endpoint doesn't support images)
auxiliary:
  vision:
    provider: "google"
    model: "gemini-2.5-flash"
    api_key: "${GEMINI_API_KEY}"
  compression:
    provider: "custom"
    base_url: "https://iu-mac-book.dinosaur-sole.ts.net/v1"
    model: "gemma4-agent"
  web_extract:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
  approval:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"

# --- Speech-to-Text (Whisper on M2 Max via mlx-audio) ---
stt:
  provider: "openai"
  openai:
    model: "mlx-community/whisper-large-v3-turbo-asr-fp16"
    base_url: "http://iu-mac-book.dinosaur-sole.ts.net:8000/v1"
    api_key: "not-needed"          # Tailscale encrypts at network layer

# --- Text-to-Speech (Qwen3-TTS VoiceDesign on M2 Max via mlx-audio) ---
# Acoustic attribute control via instruct parameter — no named voices,
# describe the desired voice in natural language instead.
# Supports: English, German, French, Japanese, Korean, Russian, Portuguese, Spanish, Italian, Chinese
tts:
  provider: "openai"
  openai:
    model: "mlx-community/Qwen3-TTS-12Hz-1.7B-VoiceDesign-bf16"
    voice: ""                      # VoiceDesign uses instruct, not named voices
    base_url: "http://iu-mac-book.dinosaur-sole.ts.net:8000/v1"
    api_key: "not-needed"          # Tailscale encrypts at network layer
    extra_body:
      instruct: >-
        A calm, composed middle-aged male voice with a deep, resonant tone
        and magnetic quality. Steady, unhurried speaking pace with clear
        articulation and warm undertones. Professional and authoritative yet
        approachable, suitable for documentary narration and thoughtful
        conversation.

# --- Slack (Socket Mode) ---
slack:
  enabled: true
  bot_token: "${SLACK_BOT_TOKEN}"
  app_token: "${SLACK_APP_TOKEN}"
  require_mention: false            # Responds to all messages in channels he's invited to
  allow_bots: "none"
  reply_in_thread: true
  reply_broadcast: false
  reply_to_mode: "first"
  group_sessions_per_user: true
  stt_enabled: true                 # Auto-transcribe voice memos
  home_channel: "${SLACK_CHANNEL_HERMES}"    # #hermes — cron results, proactive messages

# --- Web Search ---
web:
  backend: "tavily"                   # Tavily: search + extract + crawl, no CAPTCHAs

# --- Terminal Backend ---
terminal_backend: "local"

# --- Memory ---
memory:
  enabled: true
  # MEMORY.md ~2,200 chars, USER.md ~1,375 chars

# --- Context ---
context:
  compression_threshold: 0.5
  file_read_limit: 100000

