# Hermes Agent — config.yaml template
# Copy to ~/.hermes/config.yaml on Mac Mini M2 Pro
# Secrets resolved via .env — use ${VAR_NAME} syntax

# --- LLM ---
# Primary: Claude Sonnet 4.6 via IU unified endpoint (/anthropic path).
# Anthropic-compatible — Hermes' AnthropicTransport handles it natively.
model:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  api_key: "${ANTHROPIC_API_KEY}"
  base_url: "${ANTHROPIC_BASE_URL}"
  context_length: 1000000
  reasoning_effort: "medium"
  tool_use_enforcement: true

# Auxiliary model strategy:
#   compression       → Haiku 4.5 (sees full conversation, frequent calls)
#   web_extract       → Haiku 4.5 (public web content, fast)
#   approval          → Haiku 4.5 (speed + accuracy for command classification)
#   title_generation  → Haiku 4.5 (cheap labelling — leaving as "auto" routed
#                        to gemini-3-flash-preview which is unstable)
#   vision            → Gemini 2.5 Flash (IU /anthropic path doesn't support images)
#
# All slots pinned explicitly — Hermes 0.11.0 changed `auto` default to route
# unpinned slots either to main model OR to a detected env-var key
# (gemini-3-flash-preview if GEMINI_API_KEY is set), depending on the slot.
# Pin context_length on Haiku slots — IU endpoint can't be probed for context,
# so Hermes defaults to a conservative 128K. Real Haiku 4.5 context is 200K.
auxiliary:
  vision:
    provider: "google"
    model: "gemini-2.5-flash"
    api_key: "${GEMINI_API_KEY}"
  compression:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
    context_length: 200000
  web_extract:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
    context_length: 200000
  approval:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
    context_length: 200000
  title_generation:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
    context_length: 200000

# --- Speech-to-Text (Parakeet TDT v3 on local mlx-audio) ---
# Parakeet: 1.2 GB, 25 EU langs incl. EN/DE, 10–60× RT, OpenAI-compatible
# enough for Hermes (text field). MacWhisper compat requires a separate
# Caddy proxy with Content-Type rewrite — handle as follow-up.
# Whisper was tried but mlx-audio 0.4.2 has a load_model bug that breaks
# WhisperProcessor attachment, making get_tokenizer fail.
stt:
  provider: "openai"
  openai:
    model: "mlx-community/parakeet-tdt-0.6b-v3"
    base_url: "http://127.0.0.1:8000/v1"
    api_key: "not-needed"

# --- Text-to-Speech ---
# All TTS synthesis is orchestrated by localai-helper (:8001) via tts_tool.py.
# The helper handles: language detection, speakable rewrite (Haiku), title
# (Haiku), Voxtral synthesis via mlx-audio (:8000), and ffmpeg post-processing
# (leading silence trim + 30ms fade-in + 50ms fade-out + MP3 encode).
#
# Model: mlx-community/Voxtral-4B-TTS-2603-mlx-4bit (2.5 GB)
# Voice presets are language-mapped in localai/helper/routes/tts.py:
#   de → de_male  (slight Austrian Hochdeutsch lean — Mistral demo "Patrick")
#   en → neutral_male
# Voxtral has no instruct / lang_code / system_prompt — voice preset is the
# only character knob. Expression comes from text content (implicit steering).
tts:
  provider: "openai"
  openai:
    model: "mlx-community/Voxtral-4B-TTS-2603-mlx-4bit"
    voice: ""
    base_url: "http://127.0.0.1:8001/v1"
    api_key: "not-needed"

# --- Slack (Socket Mode) ---
# Per-thread sessions are the 0.11.0 default. Each top-level DM creates a new
# session in a thread; replies in that thread carry conversation context.
slack:
  enabled: true
  bot_token: "${SLACK_BOT_TOKEN}"
  app_token: "${SLACK_APP_TOKEN}"
  require_mention: false            # Responds to all messages in channels he's invited to
  allow_bots: "all"                 # Accept bot messages — channel membership is the ACL
  reply_in_thread: true             # Match per-thread session model
  reply_broadcast: false
  reply_to_mode: "first"
  group_sessions_per_user: true
  stt_enabled: true                 # Auto-transcribe voice memos
  home_channel: "${SLACK_CHANNEL_HERMES}"    # #hermes — cron results, proactive messages

# --- Homelab API ---
# Single authenticated HTTP layer for TickTick, Gmail, Calendar, Docker, UptimeKuma, Slack
# OpenAPI spec: https://api.jkrumm.com/docs/json
homelab_api:
  base_url: "https://api.jkrumm.com"
  api_key: "${HOMELAB_API_KEY}"

# --- Web Search ---
web:
  backend: "tavily"                   # Tavily: search + extract + crawl, no CAPTCHAs

# --- Terminal Backend ---
terminal_backend: "local"

# --- Memory ---
memory:
  enabled: true
  # MEMORY.md ~2,200 chars, USER.md ~1,375 chars

# --- Compression ---
# Triggers when conversation exceeds threshold × main_model.context_length.
# Sonnet 4.6 = 1M tokens, Haiku 4.5 (compression aux) = 200K tokens.
# 0.18 × 1M = 180K — leaves margin for Haiku to ingest the conversation.
# Raise the threshold only if compression aux model is upgraded to ≥256K context.
compression:
  threshold: 0.18

# --- Context ---
context:
  file_read_limit: 100000

# --- Security ---
security:
  secret_redaction: true
  smart_approval: "smart"

# --- Display ---
display:
  tool_progress: "new"
  streaming: true
  tool_progress_overrides:
    slack: "off"                    # Suppress tool noise in Slack channels
