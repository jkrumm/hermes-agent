  enabled: true
  bot_token: ${SLACK_BOT_TOKEN}
  app_token: ${SLACK_APP_TOKEN}
  allow_bots: all
  # Upstream default (every read site is .get("reply_in_thread", True)). One
  # Slack thread per conversation == one session/context window: build_session_key
  # appends thread_ts to the key, so each top-level message opens a thread with a
  # fresh, bounded window. With `false` every top-level message instead collapsed
  # into ONE never-resetting channel-wide session (observed: 213 messages over
  # 6 days) while thread replies got isolated windows — no visual cue which you
  # were in. Continuing a topic now means replying inside its thread.
  reply_in_thread: true
  reply_broadcast: false
  group_sessions_per_user: true
  stt_enabled: true
  home_channel: ${SLACK_CHANNEL_HERMES}
