secrets:
  # Headless secret injection (v0.19 SecretSource interface). This Mac mini has
  # no interactive `op` session — a direct `op read` would hang on the biometric
  # prompt — so secrets resolve from the age-encrypted offline cache through the
  # dotfiles `secrets-run` shim. `secrets.onepassword` is deliberately NOT used:
  # it needs either interactive `op` (hangs headless) or a standing
  # OP_SERVICE_ACCOUNT_TOKEN, which is a live credential with continuous vault
  # read access — strictly weaker than a sealed cache whose contents are the
  # explicit `dotfiles-private/headless.refs` allowlist (T0/T1 only,
  # op://Private/* refused at seed time).
  #
  # `secrets-run export` emits `export K='V'`; the bulk parser wants bare
  # `K=V` (it strips one layer of quotes itself), hence the sed. Measured
  # 0.29s for 26 refs — helper_timeout_seconds is headroom over the 3s default.
  # This replaces scripts/gateway-cache-launch.sh: secrets now resolve for EVERY
  # hermes invocation (gateway, CLI, cron), not just the launchd-started gateway.
  command:
    enabled: true
    command: "$HOME/.local/bin/secrets-run export --env-file=$HOME/.hermes/.env.tpl | sed 's/^export //'"
    helper_timeout_seconds: 15
    # Cache is the source of truth — a rotated ref wins over a stale inherited env.
    override_existing: true
  bitwarden:
    enabled: false
    access_token_env: BWS_ACCESS_TOKEN
    project_id: ''
    cache_ttl_seconds: 300
    override_existing: true
    auto_install: true
    server_url: ''
